# Flagger control plane (operator + Prometheus query agent + meshChecker).
# Same pattern as linkerd.yaml: commit Helm-rendered output, version-pinned.
#
#   helm template flagger flagger/flagger -n flagger-system \
#     --set meshProvider=linkerd \
#     --set metricsServer=http://prometheus.observability:9090 \
#     > flagger.yaml
#
# Per-service Canary CRs live in apps/<env>/<svc>/canary.yaml.
apiVersion: v1
kind: Namespace
metadata: { name: flagger-system }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: flagger-placeholder
  namespace: flagger-system
  annotations:
    note: Replace with helm template output of flagger version 1.x, pinned by digest.
