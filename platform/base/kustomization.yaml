apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Platform components installed in every cluster. Per-env overlays patch the
# placeholder GSA emails + project IDs.
#
# Order matters: namespaces first; CRDs (in *-rendered.yaml) before resources
# that use them; default-deny NetworkPolicy last.
resources:
  - namespace-ulys.yaml
  - namespace-observability.yaml
  - namespace-external-secrets.yaml
  - namespace-argocd.yaml
  - namespace-argo-rollouts.yaml
  - argo-cd-rendered.yaml
  - argo-rollouts-rendered.yaml
  - external-secrets-rendered.yaml
  - external-secrets-operator.yaml
  - network-policy-default-deny.yaml
