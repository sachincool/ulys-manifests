# ServiceAccount + ClusterSecretStore that wire ESO to this env's
# Google Secret Manager via Workload Identity. The GSA email is patched
# per-env in platform/<env>/kustomization.yaml.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: external-secrets
  annotations:
    iam.gke.io/gcp-service-account: PLACEHOLDER@PROJECT.iam.gserviceaccount.com
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata: { name: gcp-secret-manager }
spec:
  provider:
    gcpsm:
      projectID: PLACEHOLDER
      auth:
        workloadIdentity:
          clusterLocation: PLACEHOLDER
          clusterName: ulys-gke
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
