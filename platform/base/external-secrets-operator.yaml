# External Secrets Operator + the cluster-scoped SecretStore that points
# at this env's GCP Secret Manager. ExternalSecret CRs in apps/.../externalsecret.yaml
# reference this store by name.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: external-secrets
  annotations:
    # Pulumi outputs `esoGsaEmail`; copy it into the per-env overlay's
    # patch (apps/<env>/eso-sa-patch.yaml) so this base file stays
    # env-neutral.
    iam.gke.io/gcp-service-account: PLACEHOLDER@PROJECT.iam.gserviceaccount.com
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata: { name: gcp-secret-manager }
spec:
  provider:
    gcpsm:
      projectID: PLACEHOLDER  # patched per env
      auth:
        workloadIdentity:
          clusterLocation: PLACEHOLDER
          clusterName: ulys-gke
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# The operator itself: helm template eso eso-charts/external-secrets ...
apiVersion: v1
kind: ConfigMap
metadata:
  name: eso-placeholder
  namespace: external-secrets
  annotations:
    note: Replace with helm template output of external-secrets v0.9+, pinned.
