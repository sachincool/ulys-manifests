# Default-deny disabled for the take-home: even with `allow-dns-egress`
# permitting kube-dns, the additive NetworkPolicy semantics + GKE Calico
# made DNS resolution unreliable from the ulys namespace. Production
# would re-enable default-deny with explicit per-pod egress rules that
# include kube-dns, and would test that DNS resolves before turning the
# default-deny on.
#
# Per-pod NetworkPolicy still ships in apps/base/{api,worker}/networkpolicy.yaml —
# those are kept so that worker's INTERNAL-from-api guarantee survives.
apiVersion: v1
kind: ConfigMap
metadata:
  name: networkpolicy-disabled-note
  namespace: ulys
data:
  note: "Default-deny + DNS-allow disabled; see this file for rationale."
