# Linkerd is installed via the official Helm chart, rendered to YAML and
# committed here. To regenerate after upgrading the chart:
#
#   helm template linkerd-control-plane linkerd/linkerd-control-plane \
#     --version <X> --namespace linkerd \
#     -f linkerd-values.yaml > linkerd.yaml
#
# The control plane and the linkerd-cni get committed; the data plane
# proxy is auto-injected per-pod via the namespace annotation.
#
# This file is a placeholder. In a real repo, the rendered chart output
# replaces this comment block.
apiVersion: v1
kind: ConfigMap
metadata:
  name: linkerd-placeholder
  namespace: linkerd
  annotations:
    note: |
      Replace with `helm template` output of linkerd/linkerd-control-plane
      version 24.x. Pinned-by-digest images, mTLS bootstrap CA mounted from
      External Secret, viz extension installed separately under
      `linkerd-viz` namespace if a UI is desired.
