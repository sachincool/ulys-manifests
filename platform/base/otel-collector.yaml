# OpenTelemetry Collector — DaemonSet that receives OTLP from app pods
# and forwards traces to Cloud Trace, metrics to Cloud Monitoring (via
# Managed Prometheus already enabled at the cluster level), logs to
# Cloud Logging via the OTLP logs signal.
#
# This is a config-only manifest; the collector binary comes from the
# upstream image, pinned by digest in production.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: observability
  annotations:
    # GSA must have roles/cloudtrace.agent + logging.logWriter +
    # monitoring.metricWriter. Patched per env.
    iam.gke.io/gcp-service-account: PLACEHOLDER@PROJECT.iam.gserviceaccount.com
---
apiVersion: v1
kind: ConfigMap
metadata: { name: otel-collector-config, namespace: observability }
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318 }
    processors:
      batch:
        send_batch_size: 1024
        timeout: 5s
      resourcedetection:
        detectors: [gcp, env]
        timeout: 2s
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25
    exporters:
      googlecloud:
        log:
          default_log_name: opentelemetry.io/collector
        sending_queue:
          enabled: true
    service:
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, resourcedetection, batch]
          exporters:  [googlecloud]
        logs:
          receivers:  [otlp]
          processors: [memory_limiter, resourcedetection, batch]
          exporters:  [googlecloud]
---
apiVersion: apps/v1
kind: DaemonSet
metadata: { name: otel-collector, namespace: observability }
spec:
  selector: { matchLabels: { app: otel-collector } }
  template:
    metadata: { labels: { app: otel-collector } }
    spec:
      serviceAccountName: otel-collector
      containers:
        - name: otelcol
          image: otel/opentelemetry-collector-contrib:0.97.0
          args: ["--config=/conf/config.yaml"]
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          ports:
            - { containerPort: 4317, name: otlp-grpc }
            - { containerPort: 4318, name: otlp-http }
          volumeMounts:
            - { name: cfg, mountPath: /conf }
      volumes:
        - name: cfg
          configMap: { name: otel-collector-config }
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability
spec:
  selector: { app: otel-collector }
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: otlp-http, port: 4318, targetPort: 4318 }
