apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
patches:
  # Wire the dev project's GSA email into the External Secrets Operator KSA.
  # ESO impersonates this GSA via Workload Identity to pull from Secret Manager.
  - target: { kind: ServiceAccount, name: external-secrets, namespace: external-secrets }
    patch: |-
      - op: replace
        path: /metadata/annotations/iam.gke.io~1gcp-service-account
        value: ulys-eso@ulys-dev-34490.iam.gserviceaccount.com
  - target: { kind: ClusterSecretStore, name: gcp-secret-manager }
    patch: |-
      - op: replace
        path: /spec/provider/gcpsm/projectID
        value: ulys-dev-34490
      - op: replace
        path: /spec/provider/gcpsm/auth/workloadIdentity/clusterLocation
        value: us-central1-a
