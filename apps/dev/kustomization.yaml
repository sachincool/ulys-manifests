apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ulys
resources:
  - ../base/api
  - ../base/worker
patches:
  # Wire the dev project ID + actual Redis IP into the api Rollout.
  - target: { kind: Rollout, name: api }
    patch: |-
      - op: replace
        path: /spec/template/metadata/annotations/cloud.google.com~1sql-instance
        value: ulys-dev-34490:us-central1:ulys-pg
      - op: replace
        path: /spec/template/spec/containers/0/env
        value:
          - { name: PORT,        value: "8080" }
          - { name: DB_NAME,     value: app }
          - { name: DB_USER,     value: app }
          - { name: WORKER_URL,  value: "http://worker.ulys.svc.cluster.local" }
          - { name: REDIS_ADDR,  value: "10.99.0.3:6379" }
          - { name: CSQL_INSTANCE_CONNECTION_NAME, value: "ulys-dev-34490:us-central1:ulys-pg" }
          - name: DB_PASSWORD
            valueFrom: { secretKeyRef: { name: api-secrets, key: DB_PASSWORD } }
          - { name: GIT_SHA,    value: "set-by-ci" }
          - { name: BUILD_TIME, value: "set-by-ci" }
          - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "otel-collector.observability.svc.cluster.local:4317" }
  - target: { kind: ServiceAccount, name: api }
    patch: |-
      - op: replace
        path: /metadata/annotations/iam.gke.io~1gcp-service-account
        value: ulys-api@ulys-dev-34490.iam.gserviceaccount.com
  - target: { kind: ServiceAccount, name: worker }
    patch: |-
      - op: replace
        path: /metadata/annotations/iam.gke.io~1gcp-service-account
        value: ulys-worker@ulys-dev-34490.iam.gserviceaccount.com
# The base sets newName to ulys-dev-PROJECT_ID literal; the env overlay
# rewrites to the actual project + sets the digest.
images:
  - name: us-central1-docker.pkg.dev/ulys-dev-PROJECT_ID/ulys/api
    newName: us-central1-docker.pkg.dev/ulys-dev-34490/ulys/api
    digest: sha256:31846808f621ba21853dee85b74c9db848a370fb16a016cdea55a428e9ef7c06
  - name: us-central1-docker.pkg.dev/ulys-dev-PROJECT_ID/ulys/worker
    newName: us-central1-docker.pkg.dev/ulys-dev-34490/ulys/worker
    digest: sha256:648eaeb3f098008aa43538ee1fcbf8609e9a8e4c01d67def57b4ec4b0089d012
