# Linkerd authorization layer — defense-in-depth on top of NetworkPolicy.
# Only the api ServiceAccount can call worker (mTLS-authenticated identity).
#
# This is the in-mesh equivalent of the take-home's "ingress=INTERNAL_ONLY +
# IAM run.invoker" two-layer auth, expressed declaratively.
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata: { name: worker-http, namespace: ulys }
spec:
  podSelector: { matchLabels: { app: worker } }
  port: 8080
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata: { name: worker-from-api, namespace: ulys }
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: worker-http
  requiredAuthenticationRefs:
    - name: api
      kind: ServiceAccount
      group: ""
