# Worker is internal-only. No live-traffic canary needed; a simpler
# blue/green pattern is sufficient. Argo Rollouts swaps active and preview
# Services after a manual or automatic promotion gate.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: worker
  namespace: ulys
  labels: { app: worker }
spec:
  replicas: 2
  selector: { matchLabels: { app: worker } }
  strategy:
    blueGreen:
      activeService:  worker
      previewService: worker-preview
      autoPromotionEnabled: true
      scaleDownDelaySeconds: 30
  template:
    metadata: { labels: { app: worker } }
    spec:
      serviceAccountName: worker
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: worker
          image: worker
          ports: [{ containerPort: 8080, name: http }]
          env:
            - { name: PORT, value: "8080" }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "otel-collector.observability.svc.cluster.local:4317" }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 250m, memory: 256Mi }
          startupProbe:   { httpGet: { path: /livez, port: http }, failureThreshold: 30, periodSeconds: 5 }
          livenessProbe:  { httpGet: { path: /livez, port: http }, periodSeconds: 10 }
          readinessProbe: { httpGet: { path: /livez, port: http }, periodSeconds: 5 }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
      terminationGracePeriodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: worker, namespace: ulys }
spec:
  minAvailable: 1
  selector: { matchLabels: { app: worker } }
