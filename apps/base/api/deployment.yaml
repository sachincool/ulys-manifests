apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ulys
  labels: { app: api }
spec:
  replicas: 2
  selector: { matchLabels: { app: api } }
  template:
    metadata:
      labels: { app: api }
      annotations:
        # Tell Cloud SQL Auth Proxy CSI driver which instance to connect to.
        # Patched per env via overlays.
        cloud.google.com/sql-instance: PROJECT_ID:us-central1:ulys-pg
    spec:
      serviceAccountName: api
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: api  # replaced by Kustomize images.digest
          ports: [{ containerPort: 8080, name: http }]
          env:
            - { name: PORT,        value: "8080" }
            - { name: DB_NAME,     value: app }
            - { name: DB_USER,     value: app }
            - { name: WORKER_URL,  value: "http://worker.ulys.svc.cluster.local" }
            - { name: REDIS_ADDR,  value: "PLACEHOLDER:6379" } # patched per env
            - name: CSQL_INSTANCE_CONNECTION_NAME
              value: PROJECT_ID:us-central1:ulys-pg
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: api-secrets, key: DB_PASSWORD } }
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: api-secrets, key: REDIS_PASSWORD, optional: true } }
            - { name: GIT_SHA,    valueFrom: { fieldRef: { fieldPath: "metadata.labels['app.kubernetes.io/version']" } } }
            - { name: BUILD_TIME, value: "set-by-ci" }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "otel-collector.observability.svc.cluster.local:4317" }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          startupProbe:
            httpGet: { path: /livez, port: http }
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /livez, port: http }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
      terminationGracePeriodSeconds: 30
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: api, namespace: ulys }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: api }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: api, namespace: ulys }
spec:
  minAvailable: 1
  selector: { matchLabels: { app: api } }
