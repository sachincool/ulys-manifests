# DB password is the only piece pulled from Secret Manager. Everything
# else is plain config in the Deployment env. The DB password is a
# break-glass fallback — in steady state, the api connects via Cloud SQL
# Auth Proxy with IAM auth (no password on the wire).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-secrets
  namespace: ulys
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: api-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef: { key: db-app-password }
  # REDIS_PASSWORD lives in Secret Manager only when authEnabled=true on
  # Memorystore (staging/prod). dev's Memorystore is BASIC, no AUTH; we
  # add the redis-auth pull as an env-overlay patch in apps/{staging,prod}.
