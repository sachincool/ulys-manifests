# Permissive NetworkPolicy for api (no default-deny in effect).
# Production would tighten this — explicit egress to worker, Cloud SQL,
# Memorystore, kube-dns, plus public-internet egress only on 443.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: api, namespace: ulys }
spec:
  podSelector: { matchLabels: { app: api } }
  policyTypes: [Ingress, Egress]
  ingress:
    - {}
  egress:
    - {}
