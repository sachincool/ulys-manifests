# api Services for Argo Rollouts canary strategy:
#   api         (stable) → 80 → pod:http
#   api-canary  (canary) → 80 → pod:http
# Argo Rollouts mutates selectors during rollout to split traffic.
#
# api-public: a separate L4 LoadBalancer for external access. Production
# would put a global HTTPS LB + managed cert + Cloud Armor in front; for
# the take-home this is the minimum viable external surface.
apiVersion: v1
kind: Service
metadata: { name: api, namespace: ulys, labels: { app: api } }
spec:
  type: ClusterIP
  selector: { app: api }
  ports:
    - { name: http, port: 80, targetPort: http, protocol: TCP }
---
apiVersion: v1
kind: Service
metadata: { name: api-canary, namespace: ulys, labels: { app: api } }
spec:
  type: ClusterIP
  selector: { app: api }
  ports:
    - { name: http, port: 80, targetPort: http, protocol: TCP }
---
apiVersion: v1
kind: Service
metadata:
  name: api-public
  namespace: ulys
  labels: { app: api }
  annotations:
    cloud.google.com/l4-rbs: enabled
spec:
  type: LoadBalancer
  selector: { app: api }
  ports:
    - { name: http, port: 80, targetPort: http, protocol: TCP }
