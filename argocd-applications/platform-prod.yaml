apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-prod
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: default
  source:
    repoURL: https://github.com/sachincool/ulys-manifests
    targetRevision: HEAD
    path: platform/prod
  destination: { server: https://kubernetes.default.svc }
  # prod is sync=manual: a human approves every change. Flagger does the
  # data-driven gate; this is the single deliberate human gate per release.
  syncPolicy:
    automated: null
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-prod
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: default
  source:
    repoURL: https://github.com/sachincool/ulys-manifests
    targetRevision: HEAD
    path: apps/prod
  destination: { server: https://kubernetes.default.svc, namespace: ulys }
  syncPolicy:
    automated: null
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
